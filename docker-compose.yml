services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: edcraft-frontend:latest
    container_name: edcraft-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - edcraft-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  edcraft-network:
    external: true
